apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  labels:
    app: java-hello-world
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-hello-world
  template:
    metadata:
      labels:
        app: java-hello-world
    spec:
      containers:
      - name: java-container
        image: ditisscdac/javarepo:latest # Pulls from your DockerHub
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-app-service
spec:
  selector:
    app: java-hello-world
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
